<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Formulario de registo</h1>

         <form action="form.html" method="post"> 


     <!--Nombre completo-->
        <label for="txtnombre">Nombre completo</label>
        <input type="text" name="txtnombre" id="txtnombre" 
            placeholder="Ej. Juan Perez">
        <br> <br>

    <!--Telefono-->

         <label for="textel">Numero de telefono</label>
        <input type="tel" name="" id="textel" name="textel" required 
        pattern="[0-9]{10}"
             placeholder="10 digitos (EJ.8123457852)">
        <br><br>

    
    <!--Correo electronico-->
        <label for="txtemail">Direccion de correo:</label>
        <input type="email" name="txtemail"
             placeholder="ejemplo@correo.com">
        <br><br>
    

     <!--Contraseña-->
        <label for="txtpass">Ingrese contraseña</label>
        <input type="password" id="txtpass" name="txtpass" 
            placeholder="Minimo 8 caracteres" required>
        <br><br>


     <!-- Confirmar contraseña-->
        <label for="txtpass">Confirmar contraseña</label>
        <input type="password" id="txtpass" name="txtpass" 
            placeholder="Repite tu contraseña" required>
        <br><br>


     <!-- Fecha de nacimiento-->
        <label for="fecha-nac">Selecciona tu fecha de nacimiento</label>
        <input type="date" id="fecha-nac" name="fecha-nac">
        <br> <br>

     <!-- Genero-->
         <input type="radio" id="hombre" name="genero" value="hombre">
         <label for="hombre">Hombre</label><br>
         
         <input type="radio" name="radio" id="mujer" value="mujer">
         <label for="mujer">Mujer</label><br>

         <input type="radio" id="otro" name="genero" value="otro">
         <label for="otro">Otro</label><br>
         <br>

        <!-- Terminos y condiciones-->
         <input type="checkbox" id="terminos" name="terminos" required>
         <label for="terminos">Acepto los terminos y condiciones</label>
         <br> <br>


         <br> 
      <!-- Registrar-->
        <input type="submit" value="Registrar"> 


    </form>

</body>
</html>
